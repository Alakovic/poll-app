<section class="theme theme--light theme--survey-form">
  <div class="container">
    <div class="survey-form">
      <div class="survey-form__draft">
        <span>Draft</span>
      </div>
      <div class="survey-form__header">
        <h2 class="survey-form__title">Create new survey</h2>
        <button routerLink="" class="btn btn--close">Cancel</button>
      </div>
      <form class="survey-form__form">
        <fieldset class="survey-form__fieldset survey-form__fieldset--hori">
          <div class="survey-form__field survey-form__field--name">
            <label for="survey-name">Survey Name</label>
            <div class="survey-form__wrapper">
              <input type="text" id="survey-name" name="survey-name" />
              <div class="survey-form__delete"></div>
            </div>
          </div>
          <div class="survey-form__field survey-form__field--date">
            <label for="survey-date">Set end date (optional)</label>
            <div class="survey-form__wrapper">
              <input type="text" id="survey-date" name="survey-date" />
              <div class="survey-form__delete"></div>
            </div>
          </div>
          <div class="survey-form__field survey-form__field--category">
            <button class="btn btn--dropdown">
              <p>Choose category</p>
              <svg
                class="btn__icon"
                width="15"
                height="8"
                viewBox="0 0 15 8"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M6.5843 7.61702L0.261628 1.44681C0.174419 1.3617 0.109012 1.2695 0.065407 1.17021C0.0218023 1.07092 0 0.964539 0 0.851064C0 0.624114 0.0799419 0.425532 0.239826 0.255319C0.399709 0.0851064 0.610465 0 0.872093 0H14.1279C14.3895 0 14.6003 0.0851064 14.7602 0.255319C14.9201 0.425532 15 0.624114 15 0.851064C15 0.907802 14.9128 1.10638 14.7384 1.44681L8.4157 7.61702C8.27035 7.75887 8.125 7.85816 7.97965 7.91489C7.8343 7.97163 7.67442 8 7.5 8C7.32558 8 7.1657 7.97163 7.02035 7.91489C6.875 7.85816 6.72965 7.75887 6.5843 7.61702Z"
                />
              </svg>
            </button>
            <span class="survey-form__category">Sport</span>
          </div>
          <div class="survey-form__field survey-form__field--description">
            <label for="description">Describing text (optional)</label>
            <div class="survey-form__wrapper">
              <textarea
                id="description"
                name="description"
                rows="4"
                formControlName="description"
              ></textarea>
              <div class="survey-form__delete"></div>
            </div>
          </div>
        </fieldset>
        <div class="survey-form__question">
          <app-question-form></app-question-form>
          <button class="survey-form__add-question">+ Add question</button>
        </div>
      </form>
    </div>
  </div>
</section>
