<section class="overview">
  <div class="overview__filters">
    <div class="overview__filterByStatus">
      <button class="btn btn--filter" [class.btn--active]="surveyService.selectedStatus() === 'active'" [class.btn--inactive]="surveyService.selectedStatus() !== 'active'" (click)="surveyService.selectedStatus.set('active')">Active surveys</button>
      <button class="btn btn--filter" [class.btn--active]="surveyService.selectedStatus() === 'past'" [class.btn--inactive]="surveyService.selectedStatus() !== 'past'" (click)="surveyService.selectedStatus.set('past')">Past surveys</button>
    </div>
    <div class="overview__filterByCat">
      <button class="btn btn--dropdown" (click)="open = !open">
        <p>Sort by categories</p>
        <svg
          class="btn__icon"
          width="15"
          height="8"
          viewBox="0 0 15 8"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M6.5843 7.61702L0.261628 1.44681C0.174419 1.3617 0.109012 1.2695 0.065407 1.17021C0.0218023 1.07092 0 0.964539 0 0.851064C0 0.624114 0.0799419 0.425532 0.239826 0.255319C0.399709 0.0851064 0.610465 0 0.872093 0H14.1279C14.3895 0 14.6003 0.0851064 14.7602 0.255319C14.9201 0.425532 15 0.624114 15 0.851064C15 0.907802 14.9128 1.10638 14.7384 1.44681L8.4157 7.61702C8.27035 7.75887 8.125 7.85816 7.97965 7.91489C7.8343 7.97163 7.67442 8 7.5 8C7.32558 8 7.1657 7.97163 7.02035 7.91489C6.875 7.85816 6.72965 7.75887 6.5843 7.61702Z"
          />
        </svg>
      </button>
      <span class="overview__category"> {{ surveyService.selectedCategory() || '' }} </span>
      @if (open) {
        <ul class="overview__dropdown">
          <li (click)="selectCategory(null)">All categories</li>
          @for (c of surveyService.categories; track c) {
            <li (click)="selectCategory(c)">
              {{ c }}
            </li>
          }
        </ul>
      }
    </div>
  </div>
  <div class="overview__board">
    @for (s of surveyService.filteredByStatusSurveys(); track s.id) {
      <app-survey-card-board [survey]="s"></app-survey-card-board>
    }
  </div>
</section>
